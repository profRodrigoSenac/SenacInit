<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento</title>
</head>
<body>
    <center>
        <h1>Login</h1>
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button>Entrar</button>
    </center>
    <style>
        body{
            background-color: #232323;
        }
        center{
            margin-top: 100px;
        }
        h1{
            color: goldenrod;
            font-family: Arial, Helvetica, sans-serif;
        }
        input{
            display: block;
            margin: 10px auto;
            padding: 10px;
            border-radius: 5px;
            border: none;
            scrollbar-shadow-color: darkred;
            box-shadow: 0px 0px 10px goldenrod;
        }
        button{
            display: block;
            margin: 10px auto;
            padding: 10px;
            border-radius: 5px;
            border: solid 3px orangered;
            background-color: #232323;
            color: goldenrod;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0px 0px 10px goldenrod;
        }
    </style>
</body>
</html>
